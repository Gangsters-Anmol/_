<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile · MEMORIES2026</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="features/stories.css" />
  <style>
  /* ═══════════════════════════════════════════════════════════
     CSS VARIABLES — mirrors main site exactly
  ═══════════════════════════════════════════════════════════ */
  :root {
    --bg:        #f7f5f2; --bg2:     #f0ebf8;
    --surface:   rgba(255,255,255,0.68);
    --surface2:  rgba(255,255,255,0.92);
    --border:    rgba(200,190,210,0.38);
    --border2:   rgba(167,139,202,0.35);
    --text:      #2e2c3a; --text2:  #4a4760; --muted:   #7a7590;
    --accent:    #a78bca; --accent2: #f0a8b0;
    --glow:      rgba(167,139,202,0.28);
    --shadow:    0 4px 24px rgba(100,80,140,0.10);
    --shadow-lg: 0 16px 60px rgba(100,80,140,0.16);
    --r-sm:4px; --r-md:12px; --r-lg:20px; --r-xl:32px;
    --ease:  cubic-bezier(0.16,1,0.3,1);
    --trans: 0.25s cubic-bezier(0.16,1,0.3,1);
    --font-d: 'Cormorant Garamond', serif;
    --font-b: 'Jost', sans-serif;
  }
  [data-theme="dark"] {
    --bg:       #0f0d1a; --bg2:     #13102a;
    --surface:  rgba(255,255,255,0.055);
    --surface2: rgba(255,255,255,0.10);
    --border:   rgba(255,255,255,0.10);
    --border2:  rgba(196,168,232,0.28);
    --text:     #e8e4f4; --text2:  #b8b4cc; --muted:   #8a86a0;
    --accent:   #c4a8e8; --accent2: #f4b8c4;
    --glow:     rgba(196,168,232,0.22);
    --shadow:   0 4px 24px rgba(0,0,0,0.35);
    --shadow-lg:0 16px 60px rgba(0,0,0,0.5);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:var(--font-b);background:var(--bg);color:var(--text);
    min-height:100vh;transition:background .4s,color .4s;
    -webkit-font-smoothing:antialiased;}

  /* ─── NAV ─────────────────────────────────────────────── */
  .nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;
    justify-content:space-between;padding:0 clamp(1rem,4vw,2.5rem);height:58px;
    background:var(--surface);backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
  .nav__logo{font-family:var(--font-d);font-size:1.3rem;font-weight:600;
    color:var(--text);text-decoration:none;letter-spacing:.04em;}
  .nav__logo span{color:var(--accent);}
  .nav__right{display:flex;align-items:center;gap:.6rem;}
  .nav__btn{display:inline-flex;align-items:center;gap:.35rem;padding:.38rem .9rem;
    border-radius:50px;border:1px solid var(--border);background:transparent;
    color:var(--text);font-family:var(--font-b);font-size:.78rem;cursor:pointer;
    transition:all var(--trans);text-decoration:none;}
  .nav__btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
  .nav__theme{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);
    background:transparent;color:var(--text);font-size:1rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all var(--trans);}
  .nav__theme:hover{background:var(--accent);color:#fff;}

  /* ─── LOADING ─────────────────────────────────────────── */
  .p-loading{display:flex;flex-direction:column;align-items:center;
    justify-content:center;min-height:70vh;gap:1.2rem;color:var(--muted);}
  .p-spinner{width:44px;height:44px;border:3px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .p-loading p{font-size:.9rem;letter-spacing:.06em;}
  .p-error{text-align:center;padding:5rem 2rem;display:flex;flex-direction:column;
    align-items:center;gap:1rem;}
  .p-error h2{font-family:var(--font-d);font-size:2rem;color:var(--text);}
  .p-error p{color:var(--muted);font-size:.9rem;max-width:320px;}

  /* ─── PAGE ────────────────────────────────────────────── */
  .profile-page{max-width:920px;margin:0 auto;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

  /* ─── COVER ───────────────────────────────────────────── */
  .cover-wrap{position:relative;width:100%;height:clamp(140px,25vw,220px);
    overflow:hidden;background:var(--bg2);}
  .cover-img{width:100%;height:100%;object-fit:cover;display:block;}
  .cover-gradient{position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(167,139,202,.65),rgba(240,168,176,.5),rgba(126,207,207,.4));
    animation:coverAnim 8s ease-in-out infinite alternate;}
  @keyframes coverAnim{
    from{background:linear-gradient(135deg,rgba(167,139,202,.65),rgba(240,168,176,.5),rgba(126,207,207,.4));}
    to{background:linear-gradient(225deg,rgba(126,207,207,.5),rgba(167,139,202,.6),rgba(240,168,176,.6));}}
  .cover-edit-btn{position:absolute;bottom:.75rem;right:.75rem;
    display:flex;align-items:center;gap:.4rem;padding:.38rem .85rem;border-radius:50px;
    background:rgba(0,0,0,.44);color:#fff;border:1px solid rgba(255,255,255,.2);
    font-family:var(--font-b);font-size:.72rem;font-weight:500;cursor:pointer;
    backdrop-filter:blur(8px);transition:all .2s;letter-spacing:.04em;}
  .cover-edit-btn:hover{background:rgba(0,0,0,.65);}
  .cover-prog{position:absolute;bottom:0;left:0;right:0;height:3px;display:none;}
  .cover-prog-bar{height:100%;width:0%;
    background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .15s;}

  /* ─── HEADER ──────────────────────────────────────────── */
  .profile-header{padding:0 clamp(1rem,4vw,2rem) 1.4rem;
    animation:fadeUp .5s var(--ease) both;}

  /* Avatar */
  .avatar-row{display:flex;align-items:flex-end;gap:1.4rem;margin-bottom:.9rem;}
  .avatar-wrap{position:relative;flex-shrink:0;margin-top:clamp(-42px,-9vw,-58px);}
  .avatar-ring{position:absolute;inset:-5px;border-radius:50%;z-index:1;
    background:conic-gradient(var(--accent),var(--accent2),#7ecfcf,var(--accent));
    animation:ringRotate 3s linear infinite;}
  .avatar-ring.seen{background:var(--border);animation:none;}
  .avatar-ring.no-story{background:var(--border);animation:none;}
  @keyframes ringRotate{to{transform:rotate(360deg);}}
  .avatar-img,.avatar-initials{width:clamp(78px,17vw,108px);height:clamp(78px,17vw,108px);
    border-radius:50%;border:3.5px solid var(--bg);display:block;
    position:relative;z-index:2;object-fit:cover;}
  .avatar-initials{background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-d);font-size:clamp(1.8rem,6vw,2.6rem);
    font-weight:600;color:#fff;}
  .avatar-edit-ov{position:absolute;inset:0;z-index:3;border-radius:50%;
    background:rgba(0,0,0,.5);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:.1rem;
    cursor:pointer;opacity:0;transition:opacity .2s;}
  .avatar-wrap:hover .avatar-edit-ov{opacity:1;}
  .avatar-edit-ov span{font-size:1.15rem;}
  .avatar-edit-ov small{font-family:var(--font-b);font-size:.52rem;color:#fff;
    letter-spacing:.08em;text-transform:uppercase;font-weight:600;}
  .avatar-spin{position:absolute;inset:-5px;z-index:10;border-radius:50%;
    border:3px solid transparent;border-top-color:var(--accent);
    animation:spin .7s linear infinite;display:none;}
  .avatar-row-right{flex:1;padding-bottom:.2rem;display:flex;
    align-items:center;justify-content:flex-end;gap:.55rem;flex-wrap:wrap;}

  /* Name + badges */
  .name-row{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;margin-bottom:.25rem;}
  .profile-name{font-family:var(--font-d);font-size:clamp(1.5rem,5vw,2.1rem);
    font-weight:600;color:var(--text);line-height:1;}
  .badge{padding:.17rem .58rem;border-radius:50px;font-size:.63rem;font-weight:500;
    letter-spacing:.07em;text-transform:uppercase;color:#fff;flex-shrink:0;}
  .badge--boy{background:var(--accent);}
  .badge--girl{background:var(--accent2);color:#4a2020;}
  .badge--teacher{background:#5b7fa6;}
  .badge--parent{background:#7a6b9e;}
  .badge--special{background:linear-gradient(135deg,#f5c842,#e8a020);}
  .badge--admin{background:linear-gradient(135deg,#5b9ef0,#3a6bc8);}
  .badge--mod{background:linear-gradient(135deg,#6bcf8a,#3aa860);}

  /* Bio */
  .profile-bio{font-size:.88rem;color:var(--text2);line-height:1.55;
    margin-bottom:.8rem;max-width:400px;white-space:pre-wrap;word-break:break-word;}
  .profile-bio.empty{color:var(--muted);font-style:italic;}

  /* Stats */
  .stats-row{display:flex;gap:clamp(.7rem,3vw,2rem);margin-bottom:1rem;}
  .stat{display:flex;flex-direction:column;align-items:center;cursor:pointer;
    transition:transform var(--trans);}
  .stat:hover{transform:translateY(-2px);}
  .stat__num{font-family:var(--font-d);font-size:1.5rem;font-weight:600;
    line-height:1;color:var(--text);}
  .stat__lbl{font-size:.66rem;color:var(--muted);text-transform:uppercase;
    letter-spacing:.06em;margin-top:.1rem;}
  .stat-sep{width:1px;background:var(--border);align-self:center;height:26px;}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1.3rem;
    border-radius:50px;font-family:var(--font-b);font-size:.82rem;font-weight:500;
    cursor:pointer;transition:all var(--trans);border:none;letter-spacing:.03em;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#8b72b0;transform:translateY(-1px);box-shadow:0 6px 20px var(--glow);}
  .btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--text);}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent);}
  .btn-danger{background:transparent;border:1.5px solid rgba(224,92,106,.3);color:#e05c6a;}
  .btn-danger:hover{background:rgba(224,92,106,.08);}
  .btn-follow{background:var(--accent);color:#fff;}
  .btn-follow:hover{background:#8b72b0;transform:translateY(-1px);box-shadow:0 6px 20px var(--glow);}
  .btn-follow.following{background:transparent;border:1.5px solid var(--border2);color:var(--text);}
  .btn-follow.following:hover{border-color:#e05c6a;color:#e05c6a;background:rgba(224,92,106,.05);}
  .btn[disabled]{opacity:.5;cursor:not-allowed;transform:none!important;}

  /* Presence */
  .pres-dot{display:inline-flex;align-items:center;gap:.35rem;padding:.17rem .58rem;
    border-radius:50px;font-size:.67rem;font-weight:500;}
  .pres-dot::before{content:"";width:7px;height:7px;border-radius:50%;display:inline-block;}
  .pres-dot.on{background:rgba(46,204,113,.1);color:#27ae60;border:1px solid rgba(46,204,113,.25);}
  .pres-dot.on::before{background:#2ecc71;animation:presPulse 2s infinite;box-shadow:0 0 0 0 rgba(46,204,113,.6);}
  .pres-dot.off{background:var(--bg2);color:var(--muted);border:1px solid var(--border);}
  .pres-dot.off::before{background:var(--muted);}
  @keyframes presPulse{0%{box-shadow:0 0 0 0 rgba(46,204,113,.55);}60%{box-shadow:0 0 0 6px rgba(46,204,113,0);}100%{box-shadow:0 0 0 0 rgba(46,204,113,0);}}

  /* ─── HIGHLIGHTS ──────────────────────────────────────── */
  .highlights-row{padding:.65rem clamp(1rem,4vw,2rem);display:flex;gap:.9rem;
    overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
  .highlights-row::-webkit-scrollbar{display:none;}
  .hl-item{display:flex;flex-direction:column;align-items:center;gap:.38rem;
    cursor:pointer;flex-shrink:0;transition:transform var(--trans);}
  .hl-item:hover{transform:scale(1.07);}
  .hl-circle{width:56px;height:56px;border-radius:50%;overflow:hidden;
    border:2px solid var(--border);position:relative;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
  .hl-circle.active{border:2.5px solid transparent;
    background:linear-gradient(var(--bg),var(--bg)) padding-box,
               conic-gradient(var(--accent),var(--accent2),#7ecfcf,var(--accent)) border-box;}
  .hl-label{font-size:.62rem;color:var(--text2);max-width:56px;
    text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hl-add{width:56px;height:56px;border-radius:50%;border:2px dashed var(--border);
    display:flex;align-items:center;justify-content:center;font-size:1.3rem;
    color:var(--muted);cursor:pointer;transition:all var(--trans);flex-shrink:0;}
  .hl-add:hover{border-color:var(--accent);color:var(--accent);}

  /* ─── TABS ────────────────────────────────────────────── */
  .profile-tabs{display:flex;border-bottom:1px solid var(--border);
    padding:0 clamp(1rem,4vw,2rem);position:sticky;top:58px;z-index:100;
    background:var(--surface);backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);overflow-x:auto;scrollbar-width:none;}
  .profile-tabs::-webkit-scrollbar{display:none;}
  .p-tab{padding:.8rem 1.1rem;background:transparent;border:none;
    border-bottom:2.5px solid transparent;color:var(--muted);
    font-family:var(--font-b);font-size:.76rem;font-weight:500;cursor:pointer;
    letter-spacing:.08em;text-transform:uppercase;transition:all var(--trans);
    margin-bottom:-1px;display:flex;align-items:center;gap:.38rem;white-space:nowrap;}
  .p-tab:hover:not(.active){color:var(--text);}
  .p-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab-cnt{font-size:.63rem;background:var(--bg2);padding:.1rem .4rem;
    border-radius:50px;color:var(--muted);min-width:18px;text-align:center;}
  .p-tab.active .tab-cnt{background:rgba(167,139,202,.18);color:var(--accent);}

  /* ─── TAB PANELS ──────────────────────────────────────── */
  .tab-panel{display:none;padding:0 clamp(1rem,4vw,2rem) 2.5rem;}
  .tab-panel.active{display:block;animation:fadeUp .3s var(--ease) both;}

  /* ─── UPLOAD BANNER ───────────────────────────────────── */
  .upload-banner{margin:1.3rem 0 1rem;padding:1.1rem 1.4rem;
    border:1.5px dashed var(--border2);border-radius:var(--r-lg);
    display:flex;align-items:center;justify-content:space-between;gap:1rem;
    flex-wrap:wrap;cursor:pointer;transition:all var(--trans);
    background:linear-gradient(135deg,rgba(167,139,202,.03),rgba(240,168,176,.03));}
  .upload-banner:hover{border-color:var(--accent);background:rgba(167,139,202,.06);}
  .ub-left{display:flex;align-items:center;gap:.8rem;}
  .ub-icon{width:42px;height:42px;border-radius:50%;flex-shrink:0;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:1.1rem;
    box-shadow:0 4px 16px var(--glow);}
  .ub-text h4{font-size:.86rem;font-weight:500;color:var(--text);margin-bottom:.1rem;}
  .ub-text p{font-size:.73rem;color:var(--muted);}
  .ub-btn{padding:.48rem 1.1rem;border-radius:50px;background:var(--accent);
    color:#fff;border:none;font-family:var(--font-b);font-size:.76rem;font-weight:500;
    cursor:pointer;transition:all var(--trans);white-space:nowrap;flex-shrink:0;}
  .ub-btn:hover{background:#8b72b0;}

  /* ─── POSTS GRID ──────────────────────────────────────── */
  .posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
  @media(max-width:480px){.posts-grid{grid-template-columns:repeat(2,1fr);}}
  .grid-tile{aspect-ratio:1;position:relative;overflow:hidden;
    background:var(--bg2);cursor:pointer;border-radius:3px;
    animation:tileIn .4s var(--ease) both;}
  @keyframes tileIn{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
  .grid-tile img,.grid-tile video{width:100%;height:100%;object-fit:cover;display:block;
    transition:transform .4s var(--ease);}
  .grid-tile:hover img,.grid-tile:hover video{transform:scale(1.07);}
  .tile-hover{position:absolute;inset:0;background:rgba(0,0,0,.42);
    display:flex;align-items:center;justify-content:center;gap:1.3rem;
    opacity:0;transition:opacity .22s;}
  .grid-tile:hover .tile-hover{opacity:1;}
  .tile-stat{display:flex;align-items:center;gap:.3rem;color:#fff;font-size:.8rem;font-weight:500;}
  .grid-tile--text{display:flex;align-items:center;justify-content:center;padding:.7rem;}
  .grid-tile--text p{font-family:var(--font-d);font-size:.8rem;color:var(--muted);
    text-align:center;overflow:hidden;display:-webkit-box;
    -webkit-line-clamp:5;-webkit-box-orient:vertical;}
  .media-badge{position:absolute;top:.4rem;right:.4rem;background:rgba(0,0,0,.55);
    color:#fff;border-radius:4px;font-size:.58rem;padding:.13rem .32rem;
    pointer-events:none;letter-spacing:.04em;}
  .grid-empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;
    padding:4rem 1rem;gap:.7rem;color:var(--muted);}
  .grid-empty__icon{font-size:2.8rem;}
  .grid-empty h3{font-family:var(--font-d);font-size:1.35rem;color:var(--text2);}
  .grid-empty p{font-size:.83rem;}

  /* ─── FOLLOW LISTS ────────────────────────────────────── */
  .follow-list{display:flex;flex-direction:column;gap:.55rem;padding-top:.9rem;}
  .follow-row{display:flex;align-items:center;gap:.85rem;padding:.7rem .95rem;
    border-radius:var(--r-md);background:var(--surface);border:1px solid var(--border);
    text-decoration:none;color:var(--text);transition:all var(--trans);}
  .follow-row:hover{border-color:var(--accent);box-shadow:0 4px 14px var(--glow);transform:translateX(2px);}
  .fr-av{width:42px;height:42px;border-radius:50%;flex-shrink:0;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-d);font-size:1.1rem;font-weight:600;color:#fff;overflow:hidden;}
  .fr-av img{width:100%;height:100%;object-fit:cover;}
  .fr-name{font-weight:500;font-size:.87rem;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;}
  .fr-role{font-size:.71rem;color:var(--muted);margin-top:.1rem;text-transform:capitalize;}
  .follow-empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-style:italic;}

  /* ─── POST DETAIL MODAL ───────────────────────────────── */
  .pd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9000;
    display:flex;align-items:center;justify-content:center;
    padding:1rem;animation:ovIn .2s ease;}
  @keyframes ovIn{from{opacity:0;}to{opacity:1;}}
  .pd-modal{background:var(--bg);border-radius:var(--r-lg);width:100%;
    max-width:860px;max-height:92vh;display:grid;grid-template-columns:1fr 1fr;
    overflow:hidden;position:relative;box-shadow:var(--shadow-lg);
    animation:modIn .28s var(--ease);}
  @keyframes modIn{from{transform:scale(.94);opacity:0;}to{transform:scale(1);opacity:1;}}
  @media(max-width:620px){.pd-modal{grid-template-columns:1fr;max-height:95vh;}
    .pd-media{max-height:52vw;}}
  .pd-media{background:#000;display:flex;align-items:center;justify-content:center;
    overflow:hidden;max-height:92vh;}
  .pd-media img,.pd-media video{width:100%;height:100%;object-fit:contain;display:block;}
  .pd-media.text-only{background:var(--bg2);padding:2rem;}
  .pd-media.text-only p{font-family:var(--font-d);font-size:1.35rem;font-style:italic;
    color:var(--text);text-align:center;line-height:1.5;}
  .pd-info{display:flex;flex-direction:column;border-left:1px solid var(--border);
    max-height:92vh;overflow:hidden;}
  @media(max-width:620px){.pd-info{border-left:none;border-top:1px solid var(--border);}}
  .pd-head{display:flex;align-items:center;gap:.7rem;padding:.9rem 1.1rem;
    border-bottom:1px solid var(--border);flex-shrink:0;}
  .pd-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-d);font-weight:600;color:#fff;font-size:.95rem;overflow:hidden;}
  .pd-av img{width:100%;height:100%;object-fit:cover;}
  .pd-author{font-weight:500;font-size:.86rem;}
  .pd-time{font-size:.7rem;color:var(--muted);margin-top:.1rem;}
  .pd-close{margin-left:auto;width:28px;height:28px;border-radius:50%;
    border:1px solid var(--border);background:transparent;color:var(--muted);

/* Time ago */
function ago(date) {
  if (!date) return "";
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60)    return "just now";
  if (s < 3600)  return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return date.toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" });
}

/* Upload to Cloudinary */
function upload(file, type, onPct) {
  return new Promise((res, rej) => {
    const fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", PRESET);
    const xhr = new XMLHttpRequest();
    xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD}/${type}/upload`);
    xhr.upload.onprogress = e => { if (e.lengthComputable) onPct(Math.round(e.loaded/e.total*100)); };
    xhr.onload = () => {
      if (xhr.status === 200) {
        const d = JSON.parse(xhr.responseText);
        d.secure_url ? res(d.secure_url) : rej(new Error("No URL."));
      } else {
        let msg = `Upload failed (${xhr.status}).`;
        try { msg = JSON.parse(xhr.responseText).error?.message || msg; } catch {}
        rej(new Error(msg));
      }
    };
    xhr.onerror = () => rej(new Error("Network error."));
    xhr.send(fd);
  });
}

async function boot() {
  const root = document.getElementById("profileRoot");
  if (!targetUid) return err(root,"No profile specified","Use profile.html?user=UID");
  if (!me)        return authGate(root);

  const safety = setTimeout(() => {
    if (root.querySelector(".p-spinner")) err(root,"Taking too long","Check connection and retry.",true);
  }, 15000);

  try {
    const [uSnap, fSnap] = await Promise.all([
      getDoc(doc(db,"users",targetUid)),
      getDoc(doc(db,"follows",`${me.uid}_${targetUid}`))
    ]);
    clearTimeout(safety);
    if (!uSnap.exists() || !uSnap.data().profileComplete)
      return err(root,"Profile not found","This user hasn't completed their profile.");
    theirProfile = uSnap.data();
    isFollowing  = fSnap.exists();
    render(root);
  } catch(e) {
    clearTimeout(safety);
    err(root,"Failed to load",e.message||"Could not connect.",true);
  }

/* Count-up animation */
function countUp(id, target) {
  const el = document.getElementById(id);
  if (!el || !target) return;
  let n = 0;
  const step = Math.max(1, Math.floor(target/30));
  const iv = setInterval(() => {
    n = Math.min(n + step, target);
    el.textContent = n;
    if (n >= target) clearInterval(iv);
  }, 28);
}

    // sort newest first client-side
    docs.sort((a, b) => {
      const ta = a.data().timestamp?.toMillis?.() ?? 0;
      const tb = b.data().timestamp?.toMillis?.() ?? 0;
      return tb - ta;
    });
    const n = docs.length;
    ["pcEl","pcTab"].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = n; });
    const isOwn = me?.uid === targetUid;
    if (!n) {
      grid.innerHTML = `<div class="grid-empty">
        <div class="grid-empty__icon">${isOwn ? "📷" : "📭"}</div>
        <h3>${isOwn ? "Share your first memory" : "No posts yet"}</h3>
        <p>${isOwn ? "Tap the banner above to post something" : "Nothing here yet."}</p>
      </div>`; return;
    }
    grid.innerHTML = "";
    let delay = 0;
    docs.forEach(d => {
      const data = d.data();
      if (data.privacy === "private" && me?.uid !== targetUid && !myProfile?.admin) return;
      grid.appendChild(buildTile(d.id, data, delay));
      delay += 38;
    });
  }

  try {
    // try with orderBy first (needs composite index in Firestore console)
    const snap = await getDocs(query(
      collection(db, "posts"), where("authorId", "==", targetUid), orderBy("timestamp", "desc")
    ));
    renderDocs(snap.docs);
  } catch(e) {
    console.warn("loadPosts: ordered query failed, using fallback. Error:", e.message);
    // fallback: no orderBy, sort client-side — works without any index
    try {
      const snap = await getDocs(query(
        collection(db, "posts"), where("authorId", "==", targetUid)
      ));
      renderDocs(snap.docs);
    } catch(e2) {
      console.error("loadPosts fallback failed:", e2);
      grid.innerHTML = `<div class="grid-empty">
        <div class="grid-empty__icon">⚠️</div>
        <h3>Failed to load posts</h3>
        <p style="font-size:.75rem;color:var(--muted);max-width:260px;text-align:center">${e2.message || "Check your internet and try again."}</p>
      </div>`;
    }
  }
}

function buildTile(id, data, delay) {
  const tile = document.createElement("div");
  tile.className = "grid-tile";
  tile.style.animationDelay = delay + "ms";

  const likes    = (data.likes||[]).length;
  let   reactions = likes;
  if (data.reactions) Object.values(data.reactions).forEach(a => { if (Array.isArray(a)) reactions += a.length; });

  if (data.mediaItems?.length) {
    const m = data.mediaItems[0];
    tile.innerHTML = m.type==="video"
      ? `<video src="${esc(m.url)}" preload="metadata" muted></video>
         <span class="media-badge">▶ Video</span>
         <div class="tile-hover"><span class="tile-stat">❤️ ${reactions}</span><span class="tile-stat">💬 ${data.commentCount||0}</span></div>`
      : `<img src="${esc(m.url)}" alt="Post" loading="lazy" />
         <div class="tile-hover"><span class="tile-stat">❤️ ${reactions}</span><span class="tile-stat">💬 ${data.commentCount||0}</span></div>`;
  } else {
    tile.classList.add("grid-tile--text");
    tile.innerHTML = `<p>${esc(data.content||"")}</p>
      <div class="tile-hover"><span class="tile-stat">❤️ ${reactions}</span><span class="tile-stat">💬 ${data.commentCount||0}</span></div>`;
  }

  /* Double-tap to like */
  let lastClick = 0;
  tile.addEventListener("click", e => {
    const now = Date.now();
    if (now - lastClick < 350) {
      e.stopPropagation();
      burst(tile);
      quickLike(id, data);
    } else {
      lastClick = now;
      setTimeout(() => { if (Date.now() - lastClick >= 340) openPost(id, data); }, 360);
    }
    lastClick = now;
  });
  return tile;
}

function burst(tile) {
  tile.querySelector(".heart-burst")?.remove();
  const b = document.createElement("div");
  b.className = "heart-burst";
  b.innerHTML = `<span class="heart-burst__icon">❤️</span>`;
  tile.appendChild(b);
  setTimeout(() => b.remove(), 800);
}

async function quickLike(id, data) {
  if (!me) return;
  if ((data.likes||[]).includes(me.uid)) return;
  try {
    await updateDoc(doc(db,"posts",id), { likes: arrayUnion(me.uid) });
    data.likes = [...(data.likes||[]), me.uid];
  } catch {}
}

/* ══════════════════════════════════════════════════════
   POST DETAIL MODAL
══════════════════════════════════════════════════════ */
function openPost(id, data) {
  document.getElementById("pdOv")?.remove();
  const u = theirProfile, likes = data.likes||[], myLike = likes.includes(me?.uid);
  const time = data.timestamp?.toDate ? ago(data.timestamp.toDate()) : "";

  let mediaHTML = "";
  if (data.mediaItems?.length) {
    const m = data.mediaItems[0];
    mediaHTML = m.type==="video"
      ? `<video src="${esc(m.url)}" controls preload="metadata"></video>`
      : `<img src="${esc(m.url)}" alt="Post" />`;
  }

  let reactHTML = "";
  if (data.reactions) Object.entries(data.reactions).forEach(([e2,arr]) => {
    if (Array.isArray(arr)&&arr.length) reactHTML += `<span style="font-size:.8rem;padding:.18rem .52rem;background:var(--bg2);border-radius:50px;border:1px solid var(--border)">${e2} ${arr.length}</span>`;
  });

  const avHTML = u.photoURL ? `<img src="${esc(u.photoURL)}" />` : (u.name||"?")[0].toUpperCase();

  const ov = document.createElement("div");
  ov.id = "pdOv"; ov.className = "pd-overlay";
  ov.innerHTML = `
    <div class="pd-modal">
      <div class="pd-media ${!data.mediaItems?.length?"text-only":""}">
        ${mediaHTML || `<p>${esc(data.content||"")}</p>`}
      </div>
      <div class="pd-info">
        <div class="pd-head">
          <div class="pd-av">${avHTML}</div>
          <div><div class="pd-author">${esc(u.name)}</div><div class="pd-time">${time}</div></div>
          <button class="pd-close" id="pdClose">✕</button>
        </div>
        ${data.mediaItems?.length && data.content
          ? `<p class="pd-caption">${esc(data.content)}</p>` : ""}
        ${reactHTML ? `<div style="display:flex;gap:.38rem;flex-wrap:wrap;padding:.7rem 1.1rem;border-bottom:1px solid var(--border)">${reactHTML}</div>` : ""}
        <div class="pd-actions">
          <button class="like-btn ${myLike?"liked":""}" id="pdLikeBtn">${myLike?"❤️":"🤍"}</button>
          <span class="like-count" id="pdLikeCnt">${likes.length} <span>like${likes.length!==1?"s":""}</span></span>
          <button class="pd-share" title="Share" onclick="navigator.share?.({url:location.href})">🔗</button>
          ${me?.uid===targetUid?`<button class="btn btn-danger" id="pdDel" style="margin-left:auto;padding:.28rem .8rem;font-size:.73rem">🗑 Delete</button>`:""}
        </div>
      </div>
    </div>`;

  document.body.appendChild(ov);
  let localLikes = [...likes];

  ov.querySelector("#pdLikeBtn").addEventListener("click", async () => {
    if (!me) { toast("Sign in to like"); return; }
    const liked = localLikes.includes(me.uid);
    localLikes = liked ? localLikes.filter(u=>u!==me.uid) : [...localLikes, me.uid];
    ov.querySelector("#pdLikeBtn").classList.toggle("liked", !liked);
    ov.querySelector("#pdLikeBtn").textContent = liked ? "🤍" : "❤️";
    ov.querySelector("#pdLikeCnt").innerHTML = `${localLikes.length} <span>like${localLikes.length!==1?"s":""}</span>`;
    try {
      await updateDoc(doc(db,"posts",id), { likes: liked ? arrayRemove(me.uid) : arrayUnion(me.uid) });
      data.likes = localLikes;
      loadPosts();
    } catch {}
  });

  ov.querySelector("#pdDel")?.addEventListener("click", async () => {
    if (!confirm("Delete this post permanently?")) return;
    try {
      await deleteDoc(doc(db,"posts",id));
      await updateDoc(doc(db,"users",me.uid), { postsCount: increment(-1) });
      ov.remove(); toast("Post deleted."); loadPosts();
    } catch(e) { toast("Failed: " + e.message); }
  });

  const close = () => ov.remove();
  ov.querySelector("#pdClose").addEventListener("click", close);
  ov.addEventListener("click", e => { if (e.target===ov) close(); });
  const onKey = e => { if (e.key==="Escape") { close(); document.removeEventListener("keydown",onKey); }};
  document.addEventListener("keydown", onKey);
}

/* ══════════════════════════════════════════════════════
   UPLOAD POST MODAL
══════════════════════════════════════════════════════ */
function openUploadModal() {
  document.getElementById("upOv")?.remove();
  let staged=null, stagedURL=null, mediaType=null, postType="media";

  const ov = document.createElement("div");
  ov.id = "upOv"; ov.className = "up-overlay";
  ov.innerHTML = `
    <div class="up-modal">
      <div class="up-head">
        <span class="up-title">✦ Share a Memory</span>
        <button class="up-close" id="upClose">✕</button>
      </div>
      <div class="up-body">
        <div class="up-type-tabs">
          <button class="up-type-tab active" data-type="media">📷 Photo / Video</button>
          <button class="up-type-tab" data-type="text">✍ Text Post</button>
        </div>
        <div id="upMediaPanel">
          <div class="drop-zone" id="upDZ">
            <input type="file" id="upFile" accept="image/*,video/*" hidden />
            <span class="dz-icon">📤</span>
            <div class="dz-text">Click or drag & drop a photo or video</div>
            <div class="dz-hint">JPG · PNG · MP4 · MOV · Max 50 MB</div>
          </div>
          <div class="up-preview" id="upPrev">
            <button class="up-preview-rm" id="upPrevRm">✕</button>
          </div>
        </div>
        <div class="up-text-panel" id="upTextPanel">
          <div class="text-preview" id="upTextPrev">
            <p id="upTextPrevP">Your text will appear here…</p>
          </div>
        </div>
        <textarea class="up-caption" id="upCap" placeholder="Write a caption… (max 500)" maxlength="500" rows="3"></textarea>
        <div class="up-caption-cnt"><span id="upCapCnt">500</span> remaining</div>
        <div class="up-prog" id="upProg"><div class="up-prog-bar" id="upProgBar"></div></div>
        <p class="up-status" id="upStat"></p>
        <button class="btn btn-primary up-submit" id="upSubmit">✦ Share Post</button>
      </div>
    </div>`;

  document.body.appendChild(ov);

  const dz   = ov.querySelector("#upDZ");
  const fi   = ov.querySelector("#upFile");
  const prev = ov.querySelector("#upPrev");
  const stat = ov.querySelector("#upStat");
  const prog = ov.querySelector("#upProg");
  const bar  = ov.querySelector("#upProgBar");
  const cap  = ov.querySelector("#upCap");
  const cnt  = ov.querySelector("#upCapCnt");
  const sub  = ov.querySelector("#upSubmit");

  cap.addEventListener("input", () => {
    cnt.textContent = 500 - cap.value.length;
    if (postType==="text") ov.querySelector("#upTextPrevP").textContent = cap.value || "Your text will appear here…";
  });

  ov.querySelectorAll(".up-type-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      ov.querySelectorAll(".up-type-tab").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active"); postType = tab.dataset.type;
      ov.querySelector("#upMediaPanel").style.display = postType==="media"?"":"none";
      ov.querySelector("#upTextPanel").style.display  = postType==="text" ?"":"none";
      if (postType==="text") {
        cap.placeholder = "Write your memory… (max 500)";
        ov.querySelector("#upTextPrevP").textContent = cap.value || "Your text will appear here…";
      } else { cap.placeholder = "Write a caption… (max 500)"; }
    });
  });

  dz.addEventListener("click", () => fi.click());
  dz.addEventListener("dragover",  e => { e.preventDefault(); dz.classList.add("drag-over"); });
  dz.addEventListener("dragleave", () => dz.classList.remove("drag-over"));
  dz.addEventListener("drop", e => { e.preventDefault(); dz.classList.remove("drag-over"); stageFile(e.dataTransfer.files?.[0]); });
  fi.addEventListener("change", e => { stageFile(e.target.files?.[0]); fi.value=""; });

  function stageFile(f) {
    if (!f) return;
    if (!f.type.startsWith("image/") && !f.type.startsWith("video/")) { setStat("Only images/videos supported.","err"); return; }
    if (f.size > 50*1024*1024) { setStat("Max 50 MB.","err"); return; }
    staged=f; mediaType=f.type.startsWith("video/")?"video":"image";
    if (stagedURL) URL.revokeObjectURL(stagedURL);
    stagedURL = URL.createObjectURL(f);
    dz.style.display = "none"; prev.style.display = "block";
    prev.innerHTML = `<button class="up-preview-rm" id="upPrevRm">✕</button>
      ${mediaType==="video"
        ? `<video src="${stagedURL}" controls style="max-height:270px;object-fit:contain;width:100%;"></video>`
        : `<img src="${stagedURL}" style="max-height:270px;object-fit:contain;width:100%;" />`}`;
    prev.querySelector("#upPrevRm").addEventListener("click", clearStaged);
    setStat(f.name,"");
  }
  function clearStaged() {
    staged=null; mediaType=null;
    if (stagedURL) { URL.revokeObjectURL(stagedURL); stagedURL=null; }
    prev.style.display="none"; dz.style.display=""; setStat("","");
  }
  ov.querySelector("#upPrevRm").addEventListener("click", clearStaged);
  function setStat(msg,type) {
    stat.textContent=msg;
    stat.style.color = type==="err"?"#e05c6a":type==="ok"?"#48bb78":"var(--muted)";
  }

  sub.addEventListener("click", async () => {
    const caption = cap.value.trim();
    if (postType==="text" && !caption) { setStat("Please write something.","err"); return; }
    if (postType==="media" && !staged) { setStat("Please select a file.","err"); return; }
    sub.disabled=true; prog.style.display="block"; setStat("Uploading…","");
    try {
      let mediaItems = [];
      if (postType==="media" && staged) {
        const url = await upload(staged, mediaType, pct => { bar.style.width=pct+"%"; });
        mediaItems = [{ url, type: mediaType }];
      }
      await addDoc(collection(db,"posts"), {
        authorId:   me.uid,
        authorName: myProfile?.name || me.displayName || "Unknown",
        content: caption, mediaItems,
        timestamp: serverTimestamp(), privacy:"public",
        likes:[], reactions:{}, commentCount:0
      });
      await updateDoc(doc(db,"users",me.uid), { postsCount: increment(1) });
      setStat("Posted! ✓","ok");
      toast("Memory shared! ✦");
      setTimeout(() => { ov.remove(); loadPosts(); }, 700);
    } catch(e) {
      setStat(e.message||"Failed.","err");
      prog.style.display="none"; sub.disabled=false;
    }
  });

  const close = () => { if (stagedURL) URL.revokeObjectURL(stagedURL); ov.remove(); };
  ov.querySelector("#upClose").addEventListener("click", close);
  ov.addEventListener("click", e => { if (e.target===ov) close(); });
}

  drop.addEventListener("click",()=>fi.click());
  drop.addEventListener("dragover",e=>{e.preventDefault();drop.style.borderColor="var(--accent)";});
  drop.addEventListener("dragleave",()=>drop.style.borderColor="");
  drop.addEventListener("drop",e=>{e.preventDefault();drop.style.borderColor="";stageAv(e.dataTransfer.files?.[0]);});
  fi.addEventListener("change",e=>{stageAv(e.target.files?.[0]);fi.value="";});

  function stageAv(f) {
    if (!f) return;
    if (!f.type.startsWith("image/")) { stat.textContent="Only images allowed."; return; }
    if (f.size > 5*1024*1024)         { stat.textContent="Max 5 MB."; return; }
    staged=f;

    const pv = ov.querySelector("#avPrev");

    else { const img=document.createElement("img"); img.className="av-prev"; img.id="avPrev"; img.src=stagedURL; pv.replaceWith(img); }

  save.addEventListener("click", async () => {

      setTimeout(()=>{ if(stagedURL)URL.revokeObjectURL(stagedURL); ov.remove(); }, 600);
    } catch(e) {
      if(sp)sp.style.display="none"; prog.style.display="none";
      save.disabled=false; save.style.opacity="1";
      stat.textContent=e.message||"Upload failed."; stat.style.color="#e05c6a";
    }
  });

  ov.querySelector("#avRm")?.addEventListener("click", async () => {
    if (!confirm("Remove profile photo?")) return;
    try {
      await updateDoc(doc(db,"users",me.uid),{photoURL:null});
      theirProfile.photoURL=null; toast("Photo removed.");
      if(stagedURL)URL.revokeObjectURL(stagedURL); ov.remove();
    } catch { stat.textContent="Failed."; }
  });

  const close = () => { if(stagedURL)URL.revokeObjectURL(stagedURL); ov.remove(); };
  ov.querySelector("#avClose").addEventListener("click",close);
  ov.addEventListener("click",e=>{if(e.target===ov)close();});
}

/* ══════════════════════════════════════════════════════
   FOLLOW / UNFOLLOW
══════════════════════════════════════════════════════ */
async function toggleFollow() {
  if (!me || me.uid===targetUid) return;
  const btn=document.getElementById("followBtn"); if(btn)btn.disabled=true;
  const fRef=doc(db,"follows",`${me.uid}_${targetUid}`);
  const fcEl=document.getElementById("fcEl"), fcTab=document.getElementById("fcTab");

  try {
    if (isFollowing) {
      await deleteDoc(fRef);
      await updateDoc(doc(db,"users",targetUid),{followersCount:increment(-1)});
      await updateDoc(doc(db,"users",me.uid),{followingCount:increment(-1)});
      isFollowing=false;
      if(btn){btn.textContent="+ Follow";btn.classList.remove("following");}
      const n=Math.max(0,parseInt(fcEl?.textContent||"0")-1);
      if(fcEl)fcEl.textContent=n; if(fcTab)fcTab.textContent=n;
      toast(`Unfollowed ${theirProfile.name}`);
    } else {
      await setDoc(fRef,{followerId:me.uid,followingId:targetUid,createdAt:serverTimestamp()});
      await updateDoc(doc(db,"users",targetUid),{followersCount:increment(1)});
      await updateDoc(doc(db,"users",me.uid),{followingCount:increment(1)});
      try { await addDoc(collection(db,"notifications",targetUid,"items"),{
        type:"follow",fromUid:me.uid,fromName:myProfile?.name||"Someone",
        timestamp:serverTimestamp(),read:false});
      } catch {}
      isFollowing=true;
      if(btn){btn.textContent="✓ Following";btn.classList.add("following");}
      const n=parseInt(fcEl?.textContent||"0")+1;
      if(fcEl)fcEl.textContent=n; if(fcTab)fcTab.textContent=n;
      toast(`Now following ${theirProfile.name}! ✦`);
    }
  } catch(e) { toast("Action failed: "+e.message); }
  finally { if(btn)btn.disabled=false; }
}

/* ══════════════════════════════════════════════════════
   FOLLOWERS / FOLLOWING
══════════════════════════════════════════════════════ */
async function loadFollowers() {
  const list=document.getElementById("flList"); if(!list||list.dataset.loaded) return;
  list.dataset.loaded="1"; list.innerHTML=`<div class="follow-empty">Loading…</div>`;
  try {
    const snap=await getDocs(query(collection(db,"follows"),where("followingId","==",targetUid)));
    if(snap.empty){list.innerHTML=`<div class="follow-empty">No followers yet.</div>`;return;}
    list.innerHTML="";
    const rows=await Promise.all(snap.docs.map(async d=>{
      const uid=d.data().followerId, s=await getDoc(doc(db,"users",uid));
      return s.exists()?buildFR(uid,s.data()):null;
    }));
    rows.forEach(r=>r&&list.appendChild(r));
  } catch { list.innerHTML=`<div class="follow-empty">Failed to load.</div>`; }
}

async function loadFollowing() {
  const list=document.getElementById("fgList"); if(!list||list.dataset.loaded) return;
  list.dataset.loaded="1"; list.innerHTML=`<div class="follow-empty">Loading…</div>`;
  try {
    const snap=await getDocs(query(collection(db,"follows"),where("followerId","==",targetUid)));
    if(snap.empty){list.innerHTML=`<div class="follow-empty">Not following anyone yet.</div>`;return;}
    list.innerHTML="";
    const rows=await Promise.all(snap.docs.map(async d=>{
      const uid=d.data().followingId, s=await getDoc(doc(db,"users",uid));
      return s.exists()?buildFR(uid,s.data()):null;
    }));
    rows.forEach(r=>r&&list.appendChild(r));
  } catch { list.innerHTML=`<div class="follow-empty">Failed to load.</div>`; }
}

function buildFR(uid, u) {
  const row=document.createElement("a"); row.href=`profile.html?user=${uid}`; row.className="follow-row";
  row.innerHTML=`
    <div class="fr-av">${u.photoURL?`<img src="${esc(u.photoURL)}" />`:(u.name||"?")[0].toUpperCase()}</div>
    <div><div class="fr-name">${esc(u.name)}</div><div class="fr-role">${esc(u.role||"")}</div></div>`;
  return row;
}

/* ══════════════════════════════════════════════════════
   PRESENCE
══════════════════════════════════════════════════════ */
function loadPresence() {
  const el=document.getElementById("presBadge"); if(!el) return;
  const THRESH=120_000;
  function ren(data) {
    const online=data.online&&((Date.now()-(data.lastSeen?.toDate?.()?.getTime?.()||0))<THRESH);
    const ls=data.lastSeen?.toDate?.()||null;
    let lbl="Offline";
    if(online) lbl="Active now";
    else if(ls){ const d=Math.floor((Date.now()-ls.getTime())/1000);
      lbl=d<60?"Just now":d<3600?`${Math.floor(d/60)}m ago`:d<86400?`${Math.floor(d/3600)}h ago`:`${ls.toLocaleDateString("en-IN",{day:"numeric",month:"short"})}`; }
    el.innerHTML=`<span class="pres-dot ${online?"on":"off"}">${lbl}</span>`;
  }
  getDoc(doc(db,"users",targetUid)).then(s=>{if(s.exists())ren(s.data());}).catch(()=>{});
  onSnapshot(doc(db,"users",targetUid),s=>{if(s.exists())ren(s.data());},()=>{});
}

/* ══════════════════════════════════════════════════════
   STORY RING + HIGHLIGHTS
══════════════════════════════════════════════════════ */
async function loadStoryRing(openImmediately=false) {
  const ring=document.getElementById("avatarRing"), row=document.getElementById("hlRow");
  if(!ring||!targetUid) return;
  try {
    const snap=await getDocs(query(collection(db,"stories",targetUid,"items"),orderBy("createdAt","asc")));
    if(snap.empty) return;
    const active=snap.docs.map(d=>({id:d.id,...d.data()}))
      .filter(s=>Date.now()<(s.expiresAt?.toDate?.()?.getTime?.()||0));
    if(!active.length) return;

    const allSeen=active.every(s=>(s.seenBy||[]).includes(me?.uid));
    ring.classList.remove("no-story");
    if(allSeen) ring.classList.add("seen");
    ring.style.cursor="pointer";

    const view=()=>viewStories(targetUid,active,theirProfile.name,theirProfile.photoURL);
    ring.addEventListener("click",view);
    document.getElementById("avatarWrap")?.addEventListener("click",e=>{if(e.target===ring)view();});

    /* Highlight bubble */
    if(row) {
      const b=document.createElement("div"); b.className="hl-item";
      b.innerHTML=`
        <div class="hl-circle ${allSeen?"":"active"}">
          ${theirProfile.photoURL?`<img src="${esc(theirProfile.photoURL)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`:"✦"}
        </div>
        <span class="hl-label">${active.length} ${active.length===1?"Story":"Stories"}</span>`;
      b.addEventListener("click",view);
      const add=row.querySelector(".hl-add");
      if(add) add.after(b); else row.appendChild(b);
    }

    /* Story btn on others' profiles */
    const storyWrap=document.getElementById("storyBtnWrap");
    if(storyWrap && me?.uid!==targetUid) {
      const btn=document.createElement("button"); btn.className="btn btn-outline";
      btn.style.cssText="font-size:.76rem;padding:.4rem .82rem;";
      btn.innerHTML=`✦ ${active.length} ${active.length===1?"Story":"Stories"}`;
      btn.addEventListener("click",view); storyWrap.appendChild(btn);
    }

    if(openImmediately) view();
  } catch(e){ console.warn("storyRing:",e); }
}

/* ══════════════════════════════════════════════════════
   STORY VIEWER
══════════════════════════════════════════════════════ */
function viewStories(uid, stories, name, photoURL) {
  let idx=0, timer=null, touchX=0;
  const DUR=5000;

  function render() {
    document.getElementById("pSV")?.remove(); clearTimeout(timer);
    if(idx>=stories.length) return;
    const s=stories[idx], isOwn=uid===me?.uid, seen=s.seenBy||[];
    const init=(name||"?")[0].toUpperCase();

    const segs=stories.map((_,i)=>{
      let c="story-progress-fill";
      if(i<idx) c+=" story-progress-fill--done";
      if(i===idx) c+=" story-progress-fill--active";
      return `<div class="story-progress-segment"><div class="${c}" ${i===idx?`style="--story-duration:${DUR/1000}s"`:""}></div></div>`;
    }).join("");

    let bg="";
    if(s.type==="text")  bg=`<div class="story-slide__bg"><div class="story-slide__text-bg" style="background:${esc(s.bg||"linear-gradient(135deg,#a78bca,#f0a8b0)")}"><p>${esc(s.content||"")}</p></div></div>`;
    else if(s.type==="image") bg=`<div class="story-slide__bg"><img src="${esc(s.mediaUrl)}" alt="Story"/></div>`;
    else bg=`<div class="story-slide__bg"><video src="${esc(s.mediaUrl)}" autoplay muted playsinline loop></video></div>`;

    const ov=document.createElement("div"); ov.id="pSV"; ov.className="story-viewer-overlay";
    ov.innerHTML=`
      <div class="story-slide" id="pSVSlide">${bg}
        <div class="story-viewer__topbar">
          <div class="story-progress-bars">${segs}</div>
          <div class="story-viewer__header-row">
            <div class="story-viewer__avatar">
              ${photoURL?`<img src="${esc(photoURL)}" onerror="this.remove()"/>`:(name||"?")[0].toUpperCase()}
            </div>
            <span class="story-viewer__name">${esc(name)}</span>
            <span class="story-viewer__time">${ago(s.createdAt?.toDate?.())}</span>
            <button class="story-viewer__close" id="pSVClose">✕</button>
          </div>
        </div>
        <div class="story-tap-prev" id="pSVPrev"></div>
        <div class="story-tap-next" id="pSVNext"></div>
        ${isOwn?`<div class="story-viewer__seen">👁 ${seen.filter(u=>u!==me?.uid).length} views</div>
          <button class="story-viewer__delete" id="pSVDel">🗑 Delete</button>`:""}
      </div>`;

    document.body.appendChild(ov);

    if(!isOwn && !seen.includes(me?.uid)) {
      updateDoc(doc(db,"stories",uid,"items",s.id),{seenBy:arrayUnion(me.uid)}).catch(()=>{});
      stories[idx].seenBy=[...seen,me.uid];
    }

    ov.querySelector("#pSVClose").addEventListener("click",close);
    ov.querySelector("#pSVPrev").addEventListener("click",prev);
    ov.querySelector("#pSVNext").addEventListener("click",next);

    const onKey=e=>{if(e.key==="ArrowRight"||e.key===" ")next();if(e.key==="ArrowLeft")prev();if(e.key==="Escape")close();};
    document.addEventListener("keydown",onKey);
    ov.querySelector("#pSVClose").addEventListener("click",()=>document.removeEventListener("keydown",onKey));

    ov.addEventListener("touchstart",e=>{touchX=e.touches[0].clientX;},{passive:true});
    ov.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-touchX;if(Math.abs(dx)>50)dx<0?next():prev();},{passive:true});

    const slide=ov.querySelector("#pSVSlide");
    slide?.addEventListener("pointerdown",()=>{clearTimeout(timer);const f=ov.querySelector(".story-progress-fill--active");if(f)f.style.animationPlayState="paused";});
    slide?.addEventListener("pointerup",()=>{const f=ov.querySelector(".story-progress-fill--active");if(f)f.style.animationPlayState="running";timer=setTimeout(next,DUR);});

    ov.querySelector("#pSVDel")?.addEventListener("click",async()=>{
      if(!confirm("Delete this story?")) return;
      try { await deleteDoc(doc(db,"stories",me.uid,"items",s.id)); stories.splice(idx,1); if(!stories.length){close();return;} if(idx>=stories.length)idx--; render(); }
      catch { toast("Failed to delete."); }
    });

    timer=setTimeout(next,DUR);
  }

  const next=()=>{clearTimeout(timer);idx++;render();};
  const prev=()=>{clearTimeout(timer);idx=Math.max(0,idx-1);render();};
  const close=()=>{clearTimeout(timer);document.getElementById("pSV")?.remove();};
  render();
}
</script>
